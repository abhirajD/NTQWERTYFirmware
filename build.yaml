# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  - board: nice_nano_v2
    shield: rolio_left nice_view
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DEXTRA_CONF_FILE=../../config/rolio-nice_view.conf
    artifact-name: ntqwerty-nice_view-left
  - board: nice_nano_v2
    shield: rolio_right nice_view
    cmake-args: -DEXTRA_CONF_FILE=../../config/rolio-nice_view.conf
    artifact-name: ntqwerty-nice_view-right
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: ntqwerty-settings_reset