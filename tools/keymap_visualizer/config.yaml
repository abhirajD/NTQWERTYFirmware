scale: 3.0
center_font_ratio: 0.25
corner_font_ratio: 0.15
key_gap: 13
corner_radius: 30
padding: 20
font_scale: 1.4
colors:
  background: '#333338'
  key_fill: '#484850'
  key_border: '#686870'
  key_fill_zone_a: '#434348'
  key_fill_zone_b: '#4e4e56'
  encoder_fill: '#3e4450'
  encoder_border: '#686870'
  title: '#f0f0f0'
  legend_text: '#b0b0b8'
title: "NTQWERTY Keymap \u2014 Rolio 46"
profiles:
  mac:
    description: Graphite + Mac layers
    layers:
    - name: Graphite
      index: 0
      position: center
      color: '#ffffff'
    - name: F-Keys
      index: 6
      position: tl
      color: '#98dcff'
      opacity: 0.90
    - name: Symbols
      index: 3
      position: tr
      color: '#ffb347'
      opacity: 1.0
    - name: Numpad
      index: 5
      position: br
      color: '#90e8d0'
      opacity: 0.80
    - name: Settings
      index: 8
      position: bl
      color: '#e8c8d8'
      opacity: 0.90
  win:
    description: Windows + Win layers
    layers:
    - name: Windows
      index: 2
      position: center
      color: '#ffffff'
    - name: F-Keys (Win)
      index: 7
      position: tl
      color: '#98dcff'
      opacity: 0.90
    - name: Symbols (Win)
      index: 4
      position: tr
      color: '#ffb347'
      opacity: 1.0
    - name: Numpad
      index: 5
      position: br
      color: '#90e8d0'
      opacity: 0.80
    - name: Settings
      index: 8
      position: bl
      color: '#e8c8d8'
      opacity: 0.90
  all_layers:
    description: All 9 layers in separate images
    layers:
    - name: Graphite
      index: 0
      position: center
      color: '#ffffff'
    - name: QWERTY (Mac)
      index: 1
      position: center
      color: '#c9d1d9'
    - name: Windows
      index: 2
      position: center
      color: '#c9d1d9'
    - name: Symbols (Mac)
      index: 3
      position: center
      color: '#ffb347'
    - name: Symbols (Win)
      index: 4
      position: center
      color: '#ffb347'
    - name: Numpad
      index: 5
      position: center
      color: '#6bc5b0'
    - name: F-Keys (Mac)
      index: 6
      position: center
      color: '#90d4ff'
    - name: F-Keys (Win)
      index: 7
      position: center
      color: '#90d4ff'
    - name: Settings
      index: 8
      position: center
      color: '#a08898'
default_profile: mac
