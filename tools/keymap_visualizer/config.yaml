# Keymap Visualizer Configuration
# Controls which layers are overlaid and how they appear

scale: 3.0         # pixels per layout unit (layout units: 100 = 1 key width)
key_gap: 5         # pixel gap between key edges
corner_radius: 10  # key corner rounding in pixels
padding: 80        # pixels of padding around keyboard
font_scale: 1.0    # multiply all font sizes by this (CLI: --font-scale 1.5)

colors:
  background: "#0d1117"
  key_fill: "#161b22"
  key_border: "#30363d"
  encoder_fill: "#1c2333"
  encoder_border: "#3d5a80"
  title: "#e6edf3"
  legend_text: "#8b949e"

title: "NTQWERTY Keymap — Rolio 46"

# Layer display configuration
# position: center | tl (top-left) | tr (top-right) | bl (bottom-left) | br (bottom-right)
# skip_transparent: if true, don't show anything for &trans keys (default: true)

profiles:
  mac:
    description: "Graphite + Mac layers"
    layers:
      - name: Graphite
        index: 0
        position: center
        color: "#e6edf3"
        font_size: 18
      - name: "F-Keys"
        index: 6
        position: tl
        color: "#58a6ff"
        font_size: 11
      - name: Symbols
        index: 3
        position: tr
        color: "#d29922"
        font_size: 11
      - name: Numpad
        index: 5
        position: bl
        color: "#3fb950"
        font_size: 11
      - name: Settings
        index: 8
        position: br
        color: "#f78166"
        font_size: 11

  win:
    description: "Windows + Win layers"
    layers:
      - name: Windows
        index: 2
        position: center
        color: "#e6edf3"
        font_size: 14
      - name: "F-Keys (Win)"
        index: 7
        position: tl
        color: "#58a6ff"
        font_size: 9
      - name: "Symbols (Win)"
        index: 4
        position: tr
        color: "#d29922"
        font_size: 9
      - name: Numpad
        index: 5
        position: bl
        color: "#3fb950"
        font_size: 9
      - name: Settings
        index: 8
        position: br
        color: "#f78166"
        font_size: 9

  all_layers:
    description: "All 9 layers in separate images"
    layers:
      - name: Graphite
        index: 0
        position: center
        color: "#e6edf3"
        font_size: 14
      - name: "QWERTY (Mac)"
        index: 1
        position: center
        color: "#c9d1d9"
        font_size: 14
      - name: Windows
        index: 2
        position: center
        color: "#c9d1d9"
        font_size: 14
      - name: "Symbols (Mac)"
        index: 3
        position: center
        color: "#d29922"
        font_size: 14
      - name: "Symbols (Win)"
        index: 4
        position: center
        color: "#d29922"
        font_size: 14
      - name: Numpad
        index: 5
        position: center
        color: "#3fb950"
        font_size: 14
      - name: "F-Keys (Mac)"
        index: 6
        position: center
        color: "#58a6ff"
        font_size: 14
      - name: "F-Keys (Win)"
        index: 7
        position: center
        color: "#58a6ff"
        font_size: 14
      - name: Settings
        index: 8
        position: center
        color: "#f78166"
        font_size: 14

# Default profile to render
default_profile: mac
