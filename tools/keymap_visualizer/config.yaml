scale: 3.0
key_gap: 10
corner_radius: 20
padding: 20
font_scale: 2.0
colors:
  background: '#0d1117'
  key_fill: '#161b22'
  key_border: '#30363d'
  encoder_fill: '#1c2333'
  encoder_border: '#3d5a80'
  title: '#e6edf3'
  legend_text: '#8b949e'
title: "NTQWERTY Keymap \u2014 Rolio 46"
profiles:
  mac:
    description: Graphite + Mac layers
    layers:
    - name: Graphite
      index: 0
      position: center
      color: '#e6edf3'
    - name: F-Keys
      index: 6
      position: tl
      color: '#58a6ff'
    - name: Symbols
      index: 3
      position: tr
      color: '#d29922'
    - name: Numpad
      index: 5
      position: bl
      color: '#3fb950'
    - name: Settings
      index: 8
      position: br
      color: '#f78166'
  win:
    description: Windows + Win layers
    layers:
    - name: Windows
      index: 2
      position: center
      color: '#e6edf3'
    - name: F-Keys (Win)
      index: 7
      position: tl
      color: '#58a6ff'
    - name: Symbols (Win)
      index: 4
      position: tr
      color: '#d29922'
    - name: Numpad
      index: 5
      position: bl
      color: '#3fb950'
    - name: Settings
      index: 8
      position: br
      color: '#f78166'
  all_layers:
    description: All 9 layers in separate images
    layers:
    - name: Graphite
      index: 0
      position: center
      color: '#e6edf3'
    - name: QWERTY (Mac)
      index: 1
      position: center
      color: '#c9d1d9'
    - name: Windows
      index: 2
      position: center
      color: '#c9d1d9'
    - name: Symbols (Mac)
      index: 3
      position: center
      color: '#d29922'
    - name: Symbols (Win)
      index: 4
      position: center
      color: '#d29922'
    - name: Numpad
      index: 5
      position: center
      color: '#3fb950'
    - name: F-Keys (Mac)
      index: 6
      position: center
      color: '#58a6ff'
    - name: F-Keys (Win)
      index: 7
      position: center
      color: '#58a6ff'
    - name: Settings
      index: 8
      position: center
      color: '#f78166'
default_profile: mac
