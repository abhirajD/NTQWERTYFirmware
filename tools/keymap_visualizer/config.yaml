scale: 3.0
center_font_ratio: 0.25
corner_font_ratio: 0.15
key_gap: 13
corner_radius: 30
padding: 20
font_scale: 1.4
colors:
  background: '#333338'
  key_fill: '#484850'
  key_border: '#686870'
  encoder_fill: '#3e4450'
  encoder_border: '#686870'
  title: '#f0f0f0'
  legend_text: '#b0b0b8'
title: "NTQWERTY Keymap \u2014 Rolio 46"
profiles:
  mac:
    description: Graphite + Mac layers
    layers:
    - name: Graphite
      index: 0
      position: center
      color: '#ffffff'
    - name: F-Keys
      index: 6
      position: tl
      color: '#90d4ff'
    - name: Symbols
      index: 3
      position: tr
      color: '#ff9478'
    - name: Numpad
      index: 5
      position: bl
      color: '#50d868'
    - name: Settings
      index: 8
      position: br
      color: '#e870a0'
  win:
    description: Windows + Win layers
    layers:
    - name: Windows
      index: 2
      position: center
      color: '#ffffff'
    - name: F-Keys (Win)
      index: 7
      position: tl
      color: '#90d4ff'
    - name: Symbols (Win)
      index: 4
      position: tr
      color: '#ff9478'
    - name: Numpad
      index: 5
      position: bl
      color: '#50d868'
    - name: Settings
      index: 8
      position: br
      color: '#e870a0'
  all_layers:
    description: All 9 layers in separate images
    layers:
    - name: Graphite
      index: 0
      position: center
      color: '#ffffff'
    - name: QWERTY (Mac)
      index: 1
      position: center
      color: '#c9d1d9'
    - name: Windows
      index: 2
      position: center
      color: '#c9d1d9'
    - name: Symbols (Mac)
      index: 3
      position: center
      color: '#ff9478'
    - name: Symbols (Win)
      index: 4
      position: center
      color: '#ff9478'
    - name: Numpad
      index: 5
      position: center
      color: '#50d868'
    - name: F-Keys (Mac)
      index: 6
      position: center
      color: '#90d4ff'
    - name: F-Keys (Win)
      index: 7
      position: center
      color: '#90d4ff'
    - name: Settings
      index: 8
      position: center
      color: '#e870a0'
default_profile: mac
